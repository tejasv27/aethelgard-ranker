# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
  - "Gemini"

ai_usage_summary: |
  Used Claude and Gemini for architectural discussion, code review, and
  debugging. No candidate data was fed to any LLM during the ranking step.
  The ranking engine is fully deterministic and runs offline with zero
  external API calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Deterministic multi-signal weighted ranking pipeline. Seven scoring
  components (title/career alignment, skill quality with trust multiplier,
  experience fit curve, behavioral availability float, location preference,
  education tier, career quality) combined via weighted sum. Honeypot
  detection catches impossible profiles (>15 skills/<2y exp, near-zero
  response rates, expert skills with 0 duration). Title alignment is the
  highest-weighted signal to avoid the keyword-stuffer trap. Streaming
  JSON parsing with min-heap selection keeps memory under 2GB. Runtime is
  ~60 seconds for 100K candidates on a standard CPU.

